name: Scrape IPO data

on:
  schedule:
    - cron: "50 1 * * *" # 1:50 AM UTC (7:20 AM IST) daily
    # Backup trigger: GitHub's scheduler sometimes delays or drops runs
    # entirely. If the 7:20 run happened, this one just finds no changes.
    - cron: "25 2 * * *" # 2:25 AM UTC (7:55 AM IST) daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py --out data/ipos.json
        env:
          # NSE sometimes blocks datacenter IPs; the scraper retries with
          # backoff and keeps the previous JSON on total failure.
          PYTHONUNBUFFERED: "1"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes in scraped data."
          else
            git commit -m "chore: update IPO data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
