<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>India IPO Tracker â€” NSE + BSE</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1d21; --muted: #6b7280; --border: #e5e7eb;
    --card: #f9fafb; --accent: #2563eb; --open: #047857; --open-bg: #ecfdf5;
    --upcoming: #b45309; --upcoming-bg: #fffbeb; --closed: #6b7280; --closed-bg: #f3f4f6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111418; --fg: #e6e8ea; --muted: #9ca3af; --border: #2a2f36;
      --card: #1a1f26; --accent: #60a5fa; --open: #34d399; --open-bg: #0b2e24;
      --upcoming: #fbbf24; --upcoming-bg: #33270a; --closed: #9ca3af; --closed-bg: #22262c;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
         font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px 64px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .sub a { color: var(--accent); }
  h2 { font-size: 16px; margin: 28px 0 10px; }
  input[type=search] { width: 100%; max-width: 360px; padding: 8px 12px; font-size: 14px;
    border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--fg); }
  .tablebox { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
  table { border-collapse: collapse; width: 100%; min-width: 760px; font-size: 13.5px; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { background: var(--card); font-weight: 600; color: var(--muted); font-size: 12px;
       text-transform: uppercase; letter-spacing: .04em; }
  tr:last-child td { border-bottom: none; }
  td.company { white-space: normal; min-width: 220px; font-weight: 500; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }
  .b-open { color: var(--open); background: var(--open-bg); }
  .b-upcoming { color: var(--upcoming); background: var(--upcoming-bg); }
  .b-closed { color: var(--closed); background: var(--closed-bg); }
  .exch { color: var(--muted); font-size: 12px; }
  .num { font-variant-numeric: tabular-nums; }
  .empty { color: var(--muted); padding: 16px; }
  details { margin-top: 24px; }
  summary { cursor: pointer; color: var(--muted); font-size: 13px; }
  pre { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
        padding: 12px; overflow-x: auto; font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>India IPO Tracker</h1>
  <div class="sub">
    Combined NSE + BSE public-issue data, refreshed by a scheduled scraper.
    Raw feed: <a href="data/ipos.json">data/ipos.json</a> Â· <span id="updated"></span>
  </div>
  <input type="search" id="q" placeholder="Filter by company, symbolâ€¦" oninput="render()">
  <div id="sections"></div>
  <details>
    <summary>Record schema (one entry from the feed)</summary>
    <pre id="sample">loadingâ€¦</pre>
  </details>
</div>
<script>
let DATA = null;
const fmtDate = d => d || "â€”";
const fmtNum = n => (n === null || n === undefined) ? "â€”" : Number(n).toLocaleString("en-IN");
const fmtBand = p => {
  if (!p || (p.min == null && p.max == null)) return "â€”";
  if (p.min != null && p.max != null && p.min !== p.max) return `â‚¹${p.min}â€“â‚¹${p.max}`;
  return `â‚¹${p.min ?? p.max}`;
};
const badge = s => `<span class="badge b-${s}">${s}</span>`;

function row(ipo) {
  const sub = ipo.subscription && ipo.subscription.timesSubscribed != null
    ? Number(ipo.subscription.timesSubscribed).toFixed(2) + "Ã—" : "â€”";
  return `<tr>
    <td class="company">${ipo.companyName}${ipo.symbol ? ` <span class="exch">(${ipo.symbol})</span>` : ""}</td>
    <td>${badge(ipo.status)}</td>
    <td class="exch">${ipo.exchanges.join(" + ")}</td>
    <td>${ipo.series || "â€”"}</td>
    <td class="num">${fmtDate(ipo.issueStartDate)}</td>
    <td class="num">${fmtDate(ipo.issueEndDate)}</td>
    <td class="num">${fmtBand(ipo.priceBand)}</td>
    <td class="num">${fmtNum(ipo.lotSize)}</td>
    <td class="num">${sub}</td>
  </tr>`;
}

function section(title, ipos) {
  if (!ipos.length) return `<h2>${title}</h2><div class="empty">None right now.</div>`;
  return `<h2>${title} (${ipos.length})</h2>
  <div class="tablebox"><table>
    <thead><tr><th>Company</th><th>Status</th><th>Exchange</th><th>Series</th>
    <th>Opens</th><th>Closes</th><th>Price band</th><th>Lot</th><th>Subscribed</th></tr></thead>
    <tbody>${ipos.map(row).join("")}</tbody>
  </table></div>`;
}

function render() {
  if (!DATA) return;
  const q = document.getElementById("q").value.trim().toLowerCase();
  const match = i => !q || i.companyName.toLowerCase().includes(q) || (i.symbol || "").toLowerCase().includes(q);
  const by = s => DATA.ipos.filter(i => i.status === s && match(i));
  document.getElementById("sections").innerHTML =
    section("Open now", by("open")) +
    section("Upcoming", by("upcoming")) +
    section("Recently closed / listed", by("closed"));
}

fetch("data/ipos.json")
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(d => {
    DATA = d;
    document.getElementById("updated").textContent =
      "last updated " + new Date(d.generatedAt).toLocaleString();
    document.getElementById("sample").textContent =
      JSON.stringify(d.ipos[0] ?? {}, null, 2);
    render();
  })
  .catch(e => {
    document.getElementById("sections").innerHTML =
      `<div class="empty">Could not load data/ipos.json (${e.message}). Run the scraper first.</div>`;
  });
</script>
</body>
</html>
